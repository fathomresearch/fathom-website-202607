name = "fathom-website-chat-agent"
main = "src/index.js"
compatibility_date = "2026-07-20"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[vars]
# Comma-separated allowlist, checked in CORS handling in src/index.js.
# Cloudflare Pages preview URLs (*.pages.dev) are allowed separately, regardless of this list.
ALLOWED_ORIGINS = "https://fathomresearch.ai,https://www.fathomresearch.ai"

# Secrets (never committed) — set with:
#   wrangler secret put ANTHROPIC_API_KEY
#   wrangler secret put LEAD_WEBHOOK_URL   (optional — /submit no-ops/logs if unset)

# Fast, coarse anti-spam throttle. Counters are local to a Cloudflare location,
# so the Durable Object below remains the authoritative daily/turn counter.
[[ratelimits]]
name = "IP_MINUTE_LIMITER"
namespace_id = "41001"

  [ratelimits.simple]
  limit = 10
  period = 60

[[durable_objects.bindings]]
name = "IP_USAGE"
class_name = "IpUsageLimiter"

[exports.IpUsageLimiter]
type = "durable-object"
storage = "sqlite"
